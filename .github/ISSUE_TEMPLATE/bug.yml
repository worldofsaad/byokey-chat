name: Bug Report
description: Report a bug in BYOKey Chat
title: '[BUG] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: 'Describe the bug...'
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What you expected to happen and what actually happened
      placeholder: |
        **Expected:** The API key should be encrypted and stored successfully.
        **Actual:** The vault encryption fails with "InvalidAccessError: The operation is not supported."
    validations:
      required: true

  - type: dropdown
    id: security-impact
    attributes:
      label: Security Impact
      description: Does this bug have security implications?
      options:
        - None
        - Low — cosmetic security concern
        - Medium — potential data exposure under unlikely conditions
        - High — plaintext key exposure or auth bypass possible
        - Critical — active key exposure, vault bypass, or data breach
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and any relevant environment details
      placeholder: 'e.g., Chrome 120, macOS 14.2, Node.js 20.10'
