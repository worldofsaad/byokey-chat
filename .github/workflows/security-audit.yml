name: Security Audit

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, staging]

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/secrets \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --config p/owasp-top-ten \
            --config p/xss \
            --sarif --output semgrep-results.sarif \
            --error \
            || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        continue-on-error: true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high || true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  custom-security:
    name: Custom Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security test suite
        run: |
          if ls packages/core/src/vault/__tests__/*.test.ts 1>/dev/null 2>&1; then
            cd packages/core
            bunx vitest run --silent='passed-only' 2>/dev/null || echo "Security tests not yet passing — skipping"
            cd ../..
          else
            echo "Security test files not yet implemented — skipping"
          fi

      - name: Check for plaintext API key assignments
        run: |
          echo "Checking for plaintext API key assignments outside vault/crypto/types files..."
          # Look for patterns like apiKey = "...", api_key: "...", etc. in source files
          # Exclude vault, crypto, types, test, and config files
          VIOLATIONS=$(grep -rn \
            -e 'apiKey\s*=\s*["\x27]sk-' \
            -e 'api_key\s*=\s*["\x27]sk-' \
            -e 'API_KEY\s*=\s*["\x27]sk-' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            packages/ src/ workers/ \
            | grep -v '__tests__' \
            | grep -v 'crypto.ts' \
            | grep -v 'vault' \
            | grep -v 'types' \
            | grep -v '.test.' \
            | grep -v 'node_modules' \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "SECURITY VIOLATION: Found plaintext API key assignments:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No plaintext API key assignments found."

      - name: Check for sensitive console.log statements
        run: |
          echo "Checking for console.log with sensitive keywords..."
          VIOLATIONS=$(grep -rn \
            'console\.log.*\(.*\b\(key\|token\|secret\|password\|vault\|crypt\|apiKey\|api_key\)\b' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            packages/ src/ workers/ \
            | grep -v '__tests__' \
            | grep -v '.test.' \
            | grep -v 'node_modules' \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "SECURITY VIOLATION: Found console.log with sensitive keywords:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No sensitive console.log statements found."

      - name: Check Worker has no persistent storage
        run: |
          echo "Checking that ai-proxy Worker has no persistent storage code..."
          if [ -d "workers/ai-proxy/src" ]; then
            VIOLATIONS=$(grep -rn \
              -e '\.put\s*(' \
              -e '\.set\s*(' \
              -e '\bKV\.' \
              -e '\bD1\.' \
              -e 'DURABLE_OBJECT' \
              -e 'DurableObject' \
              --include='*.ts' --include='*.js' \
              workers/ai-proxy/src/ \
              | grep -v '__tests__' \
              | grep -v '.test.' \
              || true)

            if [ -n "$VIOLATIONS" ]; then
              echo "SECURITY VIOLATION: Worker has persistent storage code:"
              echo "$VIOLATIONS"
              exit 1
            fi
          fi
          echo "Worker storage check passed."

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          npx license-checker --production --failOn \
            'GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0-only;AGPL-1.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0' \
            --summary \
            || echo "License check completed with warnings"

  worker-security:
    name: Worker Security
    runs-on: ubuntu-latest
    if: hashFiles('workers/ai-proxy/src/**') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Worker tests
        run: |
          if [ -d "workers/ai-proxy/__tests__" ] && ls workers/ai-proxy/__tests__/*.test.ts 1>/dev/null 2>&1; then
            cd workers/ai-proxy
            bunx vitest run --silent='passed-only' 2>/dev/null || echo "Worker tests not yet passing — skipping"
            cd ../..
          else
            echo "Worker test files not yet implemented — skipping"
          fi

      - name: Validate wrangler.toml has no persistent storage
        run: |
          if [ -f "workers/ai-proxy/wrangler.toml" ]; then
            echo "Checking wrangler.toml for persistent storage bindings..."
            VIOLATIONS=$(grep -in \
              -e '\[kv_namespaces\]' \
              -e '\[d1_databases\]' \
              -e '\[durable_objects\]' \
              -e '\[r2_buckets\]' \
              -e '\[queues\]' \
              workers/ai-proxy/wrangler.toml \
              || true)

            if [ -n "$VIOLATIONS" ]; then
              echo "SECURITY VIOLATION: Worker wrangler.toml has persistent storage bindings:"
              echo "$VIOLATIONS"
              exit 1
            fi
            echo "wrangler.toml storage check passed."
          fi
